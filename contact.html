<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="./travel_recommendation.css">
</head>
<body>
    <nav>
        <a href="./index.html"><h3>Travelenture</h3></a>
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About Us</a></li>
            <li><a href="./contact.html">Contact Us</a></li>
            <li><input type="text" id="destinationSearch" placeholder="Enter a destination or keyword"></li>
            <li><button id="btn-search">Search</button></li>
            <li><button id="btn-clear">Clear</button></li>
        </ul>
    </nav>
    <div id="contact-background">
        <div class="contact-container">
            <h1>CONTACT US</h1>
            <p>Get in touch with us.</p>
        </div>
        <div class="form-container">
            <form action="#">
                <label for="name">Name</label><br>
                <input type="text" name="name" id="name" placeholder="Enter your name"><br><br>

                <label for="email">Email</label><br>
                <input type="text" name="email" id="email" placeholder="Enter your email"><br><br>
                
                <label for="message">Message</label><br>
                <textarea name="message" id="message" placeholder="Enter your message"></textarea><br><br>
                
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
